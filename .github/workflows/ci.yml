name: CI & Docker-Image

# Baut bei Pushes/PRs, testet die Go-Logik und veröffentlicht das Docker-Image
# in die GitHub Container Registry (GHCR).
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

# Node.js-20-Actions sind veraltet -> Runner zwingen, Node.js 24 zu verwenden.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Build & Test (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Go einrichten
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          # Kein Cache: Das Projekt hat keine externen Dependencies (keine go.sum).
          cache: false

      - name: Vet
        run: go vet ./...

      - name: Tests
        run: go test ./... -v

      - name: Build
        run: go build ./...

  docker:
    name: Docker-Image bauen & veröffentlichen
    runs-on: ubuntu-latest
    needs: test
    # Image nur auf main/Tags veröffentlichen, nicht bei PRs.
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: An GHCR anmelden
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadaten (Tags/Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Image bauen & pushen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
