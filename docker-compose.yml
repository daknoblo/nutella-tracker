services:
  nutella-tracker:
    # Lokal bauen ...
    build: .
    # ... oder das per Pipeline veröffentlichte Image verwenden:
    # image: ghcr.io/daknoblo/nutella-tracker:latest
    container_name: nutella-tracker
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATA_FILE: "/data/nutella.json"
    volumes:
      # JSON-Datenspeicher persistent halten (überlebt Container-Neustart).
      # Variante A (empfohlen): von Docker verwaltetes Named Volume.
      - nutella-data:/data
      # Variante B: Bind-Mount in einen Host-Ordner (JSON direkt sichtbar).
      #   Der Container läuft als root, daher sind keine Host-Rechte nötig.
      # - ./data:/data

volumes:
  nutella-data:
